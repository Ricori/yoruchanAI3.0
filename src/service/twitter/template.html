<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .tweet {
      width: 598px;
      padding: 16px;
    }

    .header {
      align-items: stretch;
      box-sizing: border-box;
      display: flex;
      flex-basis: auto;
      flex-direction: row;
      flex-shrink: 0;
      list-style: none;
      position: relative;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      overflow: hidden;
      margin-right: 8px;
      flex-shrink: 0;
      flex-grow: 0;
      align-items: center;
      flex-basis: 40px;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .name {
      font-weight: 700;
      font-size: 15px;
      color: rgb(15, 20, 25);
      line-height: 20px;
    }

    .handle {
      font-size: 15px;
      color: rgb(83, 100, 113);
      word-wrap: break-word;
      line-height: 20px;
    }

    .content {
      padding-top: 12px;
    }

    .main-text {
      white-space: normal;
      word-break: break-word;
      color: rgb(15, 20, 25);
      font-size: 17px;
      line-height: 24px;
    }

    .hashtag {
      color: rgb(29, 155, 240);
      font-size: 17px;
      line-height: 24px;
    }

    .card {
      margin-top: 16px;
      font-size: 16px;
      font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .ltr {
      color: rgb(15, 20, 25);
      font-size: 13px;
      line-height: 16px;
    }

    .ltr-blue {
      color: rgb(29, 155, 240);
      line-height: 16px;
    }

    .card-text {
      margin-top: 8px;
    }

    .card-hashtag {
      color: #1d9bf0;
    }

    .timg {
      width: 100%;
      margin-top: 8px;
      border-radius: 16px;
    }

    .footer {
      margin-top: 16px;
      color: rgb(83, 100, 113);
      font-size: 15px;
      line-height: 20px;
      font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
    }
  </style>
</head>
